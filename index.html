<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>故宫AI导览 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}

.phone{width:390px;height:844px;position:relative;overflow:hidden;border-radius:47px;box-shadow:0 0 0 4px #1a1a1a,0 0 0 6px #333,0 24px 80px rgba(0,0,0,.7);background:#eae6de}
.island{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:36px;background:#000;border-radius:0 0 22px 22px;z-index:999}
.statusbar{position:absolute;top:0;left:0;right:0;height:54px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;z-index:900;font-size:14px;font-weight:600;color:#222;transition:color .3s}
.statusbar.inv{color:#fff}

/* ===== MAP ===== */
.map-wrap{position:absolute;inset:0;z-index:1;overflow:hidden}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,0,.15,1),opacity .6s;transform-origin:center 40%}
#map-overview{transform:scale(1)}
#map-overview.hidden{opacity:0;pointer-events:none;transform:scale(1.4)}
#map-closeup{transform:scale(1)}
#map-closeup.hidden{opacity:0;pointer-events:none;transform:scale(.6)}

/* ===== GRADIENTS ===== */
.g-top{position:absolute;top:0;left:0;right:0;height:110px;background:linear-gradient(180deg,rgba(234,230,222,.7) 0%,transparent);z-index:10;pointer-events:none;opacity:0;transition:opacity .4s}
.g-top.show{opacity:1}
.g-bot{position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(0deg,rgba(255,255,255,.85) 0%,rgba(255,255,255,.3) 50%,transparent);z-index:10;pointer-events:none;opacity:0;transition:opacity .4s}
.g-bot.show{opacity:1}

/* ===== TOP PILL ===== */
.pill{position:absolute;top:62px;left:50%;transform:translateX(-50%) translateY(-6px);z-index:100;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:18px;padding:7px 16px;font-size:12.5px;font-weight:500;color:rgba(0,0,0,.65);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .35s,transform .35s;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.pill.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}

/* ===== NAV BANNER (黑卡 - two-section card) ===== */
.nav-ban{position:absolute;top:50px;left:28px;right:28px;z-index:200;transform:translateY(-160%);transition:transform .45s cubic-bezier(.4,0,.2,1)}
.nav-ban.show{transform:translateY(0)}
.nav-ban-card{border-radius:18px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.05)}
/* Top: dark navy section */
.nav-ban-top{background:#1a2332;padding:16px 16px 14px;display:flex;align-items:flex-start;gap:12px;position:relative}
.nav-ban-top .nb-arrow-wrap{width:38px;height:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-ban-top .nb-arrow-wrap svg{width:32px;height:36px}
.nav-ban-top .nb-main{flex:1;min-width:0}
.nav-ban-top .nb-dist-row{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.nav-ban-top .nb-dist-num{font-size:38px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1.5px}
.nav-ban-top .nb-dist-unit{font-size:14px;font-weight:500;color:rgba(255,255,255,.5)}
.nav-ban-top .nb-road-row{display:flex;align-items:baseline;gap:4px}
.nav-ban-top .nb-road-action{font-size:13px;color:rgba(255,255,255,.5);font-weight:500}
.nav-ban-top .nb-road-name{font-size:16px;color:#fff;font-weight:700}
/* Sound button (top-right) */
.nav-ban-top .nb-sound{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:15px;background:rgba(255,255,255,.12);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s}
.nav-ban-top .nb-sound:active{background:rgba(255,255,255,.2)}
/* Bottom: white section */
.nav-ban-bot{background:#fff;padding:10px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.nav-ban-bot .nb-total{font-size:14px;color:#1a1a1a;font-weight:600}
.nav-ban-bot .nb-total .nb-dot{margin:0 4px;color:rgba(0,0,0,.25);font-weight:400}
.nav-ban-bot .nb-arrive{font-size:14px;color:#1a1a1a;font-weight:600}

/* ===== RIGHT TOOLS (侧边栏.svg inline) ===== */
.rtools{position:absolute;right:10px;top:200px;z-index:100;width:48px;height:176px;opacity:0;transform:translateX(16px);transition:opacity .3s,transform .3s}
.rtools.show{opacity:1;transform:translateX(0)}
.rtools>svg{display:block;width:48px;height:176px}
.rtools .ov{position:absolute;left:0;width:48px;height:48px;background:none;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.rtools .ov:active{opacity:.6}
.rtools .ov:nth-of-type(1){top:0px}
.rtools .ov:nth-of-type(2){top:64px}
.rtools .ov:nth-of-type(3){top:128px}

/* ===== BOTTOM BAR (底bar.svg inline) ===== */
.bbar{position:absolute;bottom:0;left:0;right:0;z-index:300;padding:8px 10px 22px;transition:background .4s}
.bbar.dark{background:transparent}
.bbar>svg{display:block;width:100%;height:auto}

/* ===== CARDS ===== */
.card-wrap{position:absolute;bottom:108px;left:12px;right:12px;z-index:200;pointer-events:none}
.card-wrap>*{pointer-events:all;position:absolute;bottom:0;left:0;right:0}

/* Route Card */
.crd-route{background:rgba(255,255,255,.55);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,.6);border-radius:28px;padding:18px 18px 16px;box-shadow:0 8px 40px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.04);transform:translateY(120%);opacity:0;transition:transform .55s cubic-bezier(.32,1.15,.6,1),opacity .35s;max-height:640px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.crd-route::-webkit-scrollbar{display:none}
.crd-route.show{transform:translateY(0);opacity:1}
.crd-route .cr-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.crd-route .cr-icon{width:46px;height:46px;border-radius:14px;background-size:cover;background-position:center;flex-shrink:0;overflow:hidden}
.crd-route .cr-t{font-size:16px;font-weight:700;color:#1a1a1a}
.crd-route .cr-sub{font-size:12px;color:rgba(0,0,0,.4);margin-top:2px;transition:color .3s}
.crd-route .cr-meta{display:flex;gap:14px;margin-bottom:16px}
.crd-route .cr-meta span{font-size:12px;color:rgba(0,0,0,.45);display:flex;align-items:center;gap:3px}
.crd-route .cr-stops{display:flex;align-items:center;margin-bottom:18px;padding:2px 0;gap:0;width:100%}
.crd-route .cr-stops::-webkit-scrollbar{display:none}
.crd-route .snode{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.crd-route .sdot{width:10px;height:10px;border-radius:50%;border:2.5px solid #c4c4c4;background:#fff}
.crd-route .sdot.start{border-color:#34C759;background:#34C759}
.crd-route .sdot.end{border-color:#FF6B35;background:#FF6B35}
.crd-route .slbl{font-size:9px;color:rgba(0,0,0,.4);white-space:nowrap}
.crd-route .sline{flex:1;min-width:8px;height:2.5px;border-radius:2px;background:rgba(0,0,0,.07);flex-shrink:1;margin-bottom:14px}
.crd-route .cr-go{width:100%;height:46px;border-radius:23px;background:#007AFF;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 18px rgba(0,122,255,.28);transition:transform .15s}
.crd-route .cr-go:active{transform:scale(.96)}
.crd-route .cr-gen{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#34C759;background:rgba(52,199,89,.1);border-radius:10px;padding:3px 10px;margin-top:6px;font-weight:600}
.crd-route .cr-factors{font-size:11px;color:rgba(0,0,0,.35);margin-top:4px;min-height:16px;transition:opacity .25s}
.crd-route .cr-rsons{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.crd-route .cr-rson{font-size:10px;color:rgba(0,0,0,.4);background:rgba(0,0,0,.04);border-radius:8px;padding:3px 8px}
.crd-route .cr-ai-tag{background:linear-gradient(135deg,#007AFF,#5856D6);color:#fff;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:8px;flex-shrink:0;letter-spacing:.3px;box-shadow:0 2px 6px rgba(88,86,214,.25)}
.crd-route .cr-fac-status{font-size:11.5px;color:rgba(0,0,0,.42);margin-bottom:12px;min-height:16px;transition:opacity .25s;display:flex;align-items:center;gap:4px}
.crd-route .cr-factors-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;transition:opacity .45s}
.crd-route .cr-fct{display:flex;align-items:center;gap:9px;padding:9px 10px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.55);border-radius:14px;min-width:0;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.crd-route .cr-fct .fct-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.crd-route .cr-fct .fct-body{min-width:0;flex:1}
.crd-route .cr-fct .fct-lbl{font-size:9.5px;color:rgba(0,0,0,.38);line-height:1;letter-spacing:.2px}
.crd-route .cr-fct .fct-val{font-size:11.5px;color:#1a1a1a;font-weight:600;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
.crd-route .cr-ai-hint{font-size:11px;color:rgba(0,0,0,.5);margin-top:14px;margin-bottom:10px;transition:opacity .4s;display:flex;align-items:center;gap:5px}
.crd-route .cr-ai-hint .glow{width:5px;height:5px;border-radius:50%;background:#34C759;box-shadow:0 0 6px #34C759;animation:pulse-glow 1.6s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
.crd-route .ai-sugs{margin-bottom:14px}
.crd-route .cr-stops{transition:opacity .4s}
.crd-route .cr-meta{transition:opacity .4s}
.crd-route .cr-go{transition:opacity .4s,transform .15s}

/* AI suggestion chips (above input bar) */
.ai-sugs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;opacity:0;transition:opacity .4s;min-height:0}
.ai-sugs.show{opacity:1}
.ai-sugs .sg{font-size:10.5px;color:rgba(0,0,0,.7);background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:5px 12px;cursor:pointer;transition:background .15s,color .15s,border-color .15s;font-family:inherit;line-height:1.4;font-weight:500}
.ai-sugs .sg:active{background:rgba(0,122,255,.12);color:#007AFF;border-color:rgba(0,122,255,.2)}
.ai-sugs .sg.active{background:rgba(0,122,255,.15);color:#007AFF;border-color:rgba(0,122,255,.3);font-weight:600}
/* Nav Card (低卡态 - matches 低卡态-白天.svg: white 60% + border white 10%, rx=28, dark text, expand icon at bottom-right) */
.crd-nav{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:28px;border:1px solid rgba(255,255,255,.6);padding:14px 20px;transform:translateY(120%);opacity:0;transition:transform .5s cubic-bezier(.32,1.15,.6,1),opacity .3s;cursor:pointer;position:absolute;bottom:0;left:0;right:0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.crd-nav.show{transform:translateY(0);opacity:1}
.crd-nav .cn-txt{font-size:13.5px;color:rgba(0,0,0,.85);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px;padding-right:24px}
.crd-nav .cn-expand{position:absolute;right:16px;bottom:12px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;opacity:.55;pointer-events:none}
.crd-nav .cn-expand svg{width:14px;height:14px}

/* POI card container — 所有POI统一用紧凑卡 */
.crd-poi{position:absolute;inset:0;z-index:250;transform:translateY(100%);opacity:0;transition:transform .55s cubic-bezier(.32,1.05,.6,1),opacity .35s;pointer-events:none}
.crd-poi.show{transform:translateY(0);opacity:1;pointer-events:auto}

/* ========== POI 紧凑卡（贴底，参考 POI卡片.svg） ========== */
.crd-poi.compact{inset:auto;left:12px;right:12px;bottom:108px;background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:28px;border:1px solid rgba(255,255,255,.6);padding:6px 16px 12px;box-shadow:0 4px 20px rgba(0,0,0,.06);transform:translateY(120%)}
.crd-poi.compact.show{transform:translateY(0)}
.crd-poi.compact .cp-narration{font-size:13px;color:rgba(0,0,0,.78);line-height:1.6;letter-spacing:.2px;padding:6px 6px 12px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.crd-poi.compact .cp-narration em{color:#B14C1C;font-style:normal;font-weight:600}
.crd-poi.compact .cp-inner{background:rgba(255,255,255,.55);border-radius:20px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.crd-poi.compact .cp-icon{width:44px;height:44px;border-radius:14px;background-size:cover;background-position:center;flex-shrink:0;overflow:hidden}
.crd-poi.compact .cp-info{flex:1;min-width:0}
.crd-poi.compact .cp-name-row{display:flex;align-items:center;gap:6px}
.crd-poi.compact .cp-name{font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.2}
.crd-poi.compact .cp-badge{font-size:10px;font-weight:600;color:#B14C1C;background:rgba(177,76,28,.1);padding:2px 7px;border-radius:8px;white-space:nowrap}
.crd-poi.compact .cp-alias{font-size:11.5px;color:rgba(0,0,0,.5);margin-top:3px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crd-poi.compact .cp-next{flex-shrink:0;font-size:12px;font-weight:700;color:#fff;background:#B14C1C;padding:7px 12px;border-radius:14px;cursor:pointer;user-select:none;white-space:nowrap;letter-spacing:.3px;box-shadow:0 2px 8px rgba(177,76,28,.25);transition:background .15s,transform .15s}
.crd-poi.compact .cp-next:active{background:#9A3F17;transform:scale(.97)}

/* ===== COMPLETE ===== */
.comp{position:absolute;inset:0;z-index:500;background:linear-gradient(170deg,#f8f9fa,#fff 40%,#f0f4f8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center;transform:translateY(100%);transition:transform .6s cubic-bezier(.32,1,.6,1)}
.comp.show{transform:translateY(0)}
.comp .badge{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA000);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:22px;box-shadow:0 8px 32px rgba(255,160,0,.2);transform:scale(0);transition:transform .5s .3s cubic-bezier(.34,1.56,.64,1)}
.comp.show .badge{transform:scale(1)}
.comp h2{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:6px;opacity:0;transition:opacity .4s .5s}
.comp.show h2{opacity:1}
.comp .csub{font-size:13.5px;color:rgba(0,0,0,.4);margin-bottom:30px;opacity:0;transition:opacity .4s .6s}
.comp.show .csub{opacity:1}
.comp .cstats{display:flex;gap:36px;margin-bottom:36px;opacity:0;transition:opacity .4s .7s}
.comp.show .cstats{opacity:1}
.comp .cstats .sv{font-size:28px;font-weight:800;color:#007AFF}
.comp .cstats .sl{font-size:11px;color:rgba(0,0,0,.3);margin-top:3px}
.comp .cacts{width:100%;display:flex;flex-direction:column;gap:10px;opacity:0;transition:opacity .4s .8s}
.comp.show .cacts{opacity:1}
.comp .cacts button{width:100%;height:50px;border-radius:25px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s}
.comp .cacts button:active{transform:scale(.96)}
.comp .btn-s{background:#34C759;color:#fff;box-shadow:0 4px 16px rgba(52,199,89,.2)}
.comp .btn-h{background:rgba(0,0,0,.04);color:rgba(0,0,0,.5)}

/* ===== ROUTE PATH ANIMATION ===== */
#route-path{transition:opacity .3s ease}
#route-path.drawing{animation:routeDraw .9s ease forwards}
@keyframes routeDraw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}

/* ===== SHARE CARD ===== */
.share-ov{position:absolute;inset:0;z-index:600;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .4s}
.share-ov.show{opacity:1;pointer-events:all}
.share-card{width:100%;max-width:340px;background:linear-gradient(175deg,#faf8f5 0%,#f5f0e8 40%,#faf8f5 100%);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.08);transform:translateY(30px) scale(.95);transition:transform .5s cubic-bezier(.32,1.15,.6,1);position:relative}
.share-ov.show .share-card{transform:translateY(0) scale(1)}
.share-card::before{content:'';position:absolute;inset:7px;border:1px solid rgba(196,168,130,.3);border-radius:18px;pointer-events:none;z-index:1}
.sc-head{padding:26px 22px 16px;text-align:center;position:relative}
.sc-route{font-size:10px;color:#B14C1C;font-weight:600;letter-spacing:2px;margin-bottom:8px}
.sc-title{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:2px;margin-bottom:3px;font-family:'Noto Serif SC','Songti SC',serif}
.sc-sub{font-size:11px;color:rgba(0,0,0,.32)}
.sc-deco{display:flex;align-items:center;justify-content:center;gap:8px;padding:2px 0 14px}
.sc-deco::before,.sc-deco::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(196,168,130,.45),transparent)}
.sc-deco span{font-size:11px;color:#c4a882;letter-spacing:1.5px}
.sc-body{padding:0 18px 14px}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sc-item{border-radius:12px;overflow:hidden;background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.04)}
.sc-thumb{width:100%;aspect-ratio:1;background-size:cover;background-position:center}
.sc-lbl{font-size:9.5px;color:rgba(0,0,0,.6);text-align:center;padding:5px 2px 6px;font-weight:500}
.sc-stats{display:flex;justify-content:space-around;padding:11px 8px;background:rgba(255,255,255,.6);border-radius:14px;margin-bottom:14px}
.sc-stat{text-align:center}
.sc-sv{font-size:17px;font-weight:700;color:#B14C1C}
.sc-sl{font-size:9px;color:rgba(0,0,0,.3);margin-top:2px}
.sc-foot{padding:0 22px 18px;text-align:center}
.sc-brand{display:flex;align-items:center;justify-content:center;gap:5px;font-size:10.5px;color:rgba(0,0,0,.28);margin-bottom:10px}
.sc-brand-dot{width:4px;height:4px;border-radius:50%;background:#c4a882}
.sc-btns{display:flex;gap:8px}
.sc-btns button{flex:1;height:42px;border-radius:21px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:transform .15s;font-family:inherit}
.sc-btns button:active{transform:scale(.96)}
.sc-save{background:#B14C1C;color:#fff;box-shadow:0 4px 14px rgba(177,76,28,.22)}
.sc-close{background:rgba(0,0,0,.05);color:rgba(0,0,0,.45)}

/* ===== TOAST ===== */
.toast{position:absolute;top:100px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(30,30,30,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;padding:9px 18px;border-radius:18px;font-size:13px;z-index:1000;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:5px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== EXIT DIALOG ===== */
.dlg{position:absolute;inset:0;z-index:800;background:rgba(0,0,0,0);display:none;align-items:flex-end;transition:background .3s}
.dlg.show{display:flex;background:rgba(0,0,0,.38)}
.dlg .dbox{width:100%;background:#fff;border-radius:20px 20px 0 0;padding:26px 24px 42px;text-align:center;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.dlg.show .dbox{transform:translateY(0)}
.dlg h3{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:6px}

function switchRoute(idx) {
  // Toggle: click same chip again to revert to default route
  if (idx === currentRoute) idx = 0;
  if (idx === currentRoute) return;
  currentRoute = idx;
  const r = routes[idx];
  const pathEl = document.getElementById('route-path');
  if (!pathEl) return;

  // 1. Fade out old path
  pathEl.style.opacity = '0';
  pathEl.classList.remove('drawing');

  setTimeout(() => {
    // 2. Set new path data
    pathEl.setAttribute('d', r.path);

    // 3. Compute path length & set up draw-on animation
    const len = pathEl.getTotalLength();
    pathEl.style.strokeDasharray = len;
    pathEl.style.setProperty('--len', len);
    pathEl.style.strokeDashoffset = len;
    pathEl.style.opacity = '.65';

    // 4. Force reflow, then start draw animation
    void pathEl.getBoundingClientRect();
    pathEl.classList.add('drawing');

    // 5. Update route card metadata
    const stopsEl = document.getElementById('cr-stops');
    if (stopsEl) {
      stopsEl.innerHTML = r.pois.map((name, i) =>
        '<div class="snode"><div class="sdot ' + (i===0?'start':'') + (i===r.pois.length-1?'end':'') + '"></div><div class="slbl">' + name + '</div></div>' +
        (i < r.pois.length-1 ? '<div class="sline"></div>' : '')
      ).join('');
    }

    // 6. Update factor cells
    const facGrid = document.getElementById('cr-fac-grid');
    if (facGrid) {
      const vals = facGrid.querySelectorAll('.fct-val');
      if (vals[1]) vals[1].textContent = '约' + r.time;
      if (vals[3]) vals[3].textContent = r.tag;
    }

    // 7. Flash route name update
    toast('🗺️', '已切换至「' + r.name + '」');

    // 8. Highlight active chip (route 0 = no chip highlighted)
    document.querySelectorAll('#ai-sugs .sg').forEach((btn, i) => {
      btn.classList.toggle('active', idx > 0 && (i + 1) === idx);
    });
  }, 320);
}

function updatePositionMarker() {
  if (walkTimer) { clearInterval(walkTimer); walkTimer = null; }
  const ind = document.getElementById('pos-indicator');
  const dot = document.getElementById('pos-dot');
  const glow = document.getElementById('pos-glow');
  const pulse = document.getElementById('pos-pulse');
  const arrow = document.getElementById('pos-arrow');
  const traveled = document.getElementById('traveled');
  if (!ind) return;

  const fromY = poiY[poi];
  const toY = poiY[poi + 1] || fromY;
  ind.style.display = '';

  // Animate walking from current POI toward next POI
  let progress = 0;
  const duration = 50; // steps
  function step() {
    progress++;
    const t = Math.min(progress / duration, 0.65); // stop at 65% (not arrive)
    const cy = fromY + (toY - fromY) * t;

    dot.setAttribute('cy', cy);
    glow.setAttribute('cy', cy);
    pulse.setAttribute('cy', cy);
    arrow.setAttribute('points', `195,${cy - 16} 189,${cy - 6} 201,${cy - 6}`);
    traveled.setAttribute('d', `M195,${fromY} L195,${cy}`);
    if (progress < duration) walkTimer = setTimeout(step, 60);
  }
  // Start from current POI position
  traveled.setAttribute('d', `M195,${fromY}`);
  step();
}

function hidePositionMarker() {
  if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; }
  const ind = document.getElementById('pos-indicator');
  const traveled = document.getElementById('traveled');
  if (ind) ind.style.display = 'none';
  if (traveled) { const y1 = poiY[poi] || 711; traveled.setAttribute('d', `M195,${y1}`); }
}

function init() {
  // Initial route path draw-on animation
  const pathEl = document.getElementById('route-path');
  if (pathEl) {
    const len = pathEl.getTotalLength();
    pathEl.style.strokeDasharray = len;
    pathEl.style.setProperty('--len', len);
    pathEl.style.strokeDashoffset = len;
    void pathEl.getBoundingClientRect();
    pathEl.classList.add('drawing');
  }
  setState('route');
}

function setState(s) {
  state = s;
  hideCards();
  hidePositionMarker();
  const bbar = document.getElementById('bbar');
  bbar.style.opacity = (s==='complete') ? '0' : '1';
  switch(s) {
    case 'route':
      setMap('overview', true);
      showEl('g-top');showEl('g-bot');
      hideEl('nav-ban');hideEl('rtools');
      showPill('🧭','为您推荐专属路线');
      renderRoute();
      setLabel('搜索景点或服务');
      document.getElementById('sbar').classList.remove('inv');
      bbar.classList.remove('dark');
      break;
    case 'nav':
      setMap('overview');
      showEl('g-top');showEl('g-bot');
      showEl('nav-ban');showEl('rtools');
      hidePill();
      renderNav();
      setLabel('前往'+pois[poi].name+' · '+(poi+1)+'/6');
      updateBanner();
      updatePositionMarker();
      document.getElementById('sbar').classList.remove('inv');
      bbar.classList.remove('dark');
      break;
    case 'poi':
      setMap('closeup');
      hideEl('g-top');hideEl('g-bot');
      hidePill();
      showEl('nav-ban');showEl('rtools');
      updateBanner();
      renderPoi();
      setLabel('导览中 · '+pois[poi].name);
      updateCloseup();
      document.getElementById('sbar').classList.remove('inv');
      bbar.classList.remove('dark');
      break;
    case 'complete':
      hideEl('nav-ban');hideEl('rtools');hidePill();
      document.getElementById('comp').classList.add('show');
      break;
  }
}

      const parts=facs[fi].split(' ');
      statusEl.firstElementChild.textContent=parts[0];
      facTxt.textContent=parts.slice(1).join(' ');
    } else {
      clearInterval(iv);
      statusEl.innerHTML='<span class="cr-gen">✓ 已生成专属最佳路线</span>';
      setTimeout(()=>{
        document.getElementById('cr-fac-grid').style.opacity='1';
        document.getElementById('cr-fac-grid').style.pointerEvents='';
      },80);
      setTimeout(()=>document.getElementById('cr-stops').style.opacity='1',320);
      setTimeout(()=>document.getElementById('cr-go').style.opacity='1',440);
      // Reveal AI hint → suggestion chips
      setTimeout(()=>{document.getElementById('cr-ai-hint').style.opacity='1'},700);
      setTimeout(()=>{const s=document.getElementById('ai-sugs');if(s){s.style.opacity='1';s.classList.add('show')}},1000);
    }
  },500);
}

function renderNav(){
  const c=document.getElementById('crd-nav');
  c.innerHTML=`<div class="cn-txt">${walks[poi]}</div><div class="cn-expand"><svg viewBox="0 0 16 16" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M2.5 9.5v3a1 1 0 0 0 1 1h3a.5.5 0 0 0 0-1H4.207l2.146-2.146a.5.5 0 0 0-.707-.708L3.5 11.793V9.5a.5.5 0 0 0-1 0zM13.5 6.5v-3a1 1 0 0 0-1-1h-3a.5.5 0 0 0 0 1h2.293L9.646 5.646a.5.5 0 1 0 .708.708L12.5 4.207V6.5a.5.5 0 0 0 1 0z" fill="rgba(0,0,0,.6)"/></svg></div>`;
  c.onclick=()=>setState('poi');
  setTimeout(()=>c.classList.add('show'),80);
}
function renderPoi(){
  const p=pois[poi]; const last=poi===5;
  const c=document.getElementById('crd-poi');
  c.className='crd-poi compact';
  const nextLabel = last ? '完成游览 →' : '下一站 →';
  const nextTip = last ? '完成整条路线' : '前往 '+pois[poi+1].name;
  c.innerHTML=`
    <div class="cp-narration">${poiBody[poi]}</div>
    <div class="cp-inner">
      <div class="cp-icon" style="background-image:url('${p.img}')"></div>
      <div class="cp-info">
        <div class="cp-name-row">
          <span class="cp-name">${p.name}</span>
          <span class="cp-badge">正在参观</span>
        </div>
        <div class="cp-alias">${p.alias}</div>
      </div>
      <div class="cp-next" title="${nextTip}" aria-label="${nextTip}">${nextLabel}</div>
    </div>`;
  const nextBtn = c.querySelector('.cp-next');
  nextBtn.addEventListener('click', e => { e.stopPropagation(); next(); });
  let sy=null;
  c.addEventListener('touchstart', e=>{ sy=e.touches[0].clientY; }, {passive:true});
  c.addEventListener('touchmove', e=>{
    if(sy===null) return;
    const dy = e.touches[0].clientY - sy;
    if(dy < -40){ sy=null; next(); }
  }, {passive:true});
  setTimeout(()=>c.classList.add('show'),60);
}

// Flow
function startNav(){poi=0;setState('nav')}
function next(){if(poi>=5){setState('complete')}else{poi++;setState('nav')}}
function reset(){
  poi=0;
  document.getElementById('comp').classList.remove('show');
  document.getElementById('share-ov').classList.remove('show');
  document.getElementById('bbar').style.opacity='1';
  setState('route');
}

// Dialog
function showDlg(){document.getElementById('dlg').classList.add('show')}
function hideDlg(){document.getElementById('dlg').classList.remove('show')}

// Toast
function toast(ic,txt){
  const t=document.getElementById('toast');
  t.innerHTML='<span>'+ic+'</span><span>'+txt+'</span>';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// Share Card
function showShareCard(){
  const grid=document.getElementById('sc-grid');
  grid.innerHTML=pois.map(p=>`<div class="sc-item"><div class="sc-thumb" style="background-image:url('${p.img}')"></div><div class="sc-lbl">${p.name}</div></div>`).join('');
  document.getElementById('share-ov').classList.add('show');
}
function hideShareCard(){
  document.getElementById('share-ov').classList.remove('show');
}

init();

// Clean up bottom bar SVG: only remove white bg rect, keep all text/icons
</script>
